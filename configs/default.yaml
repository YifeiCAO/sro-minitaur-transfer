# Default paths and hyperparameters. Override per-environment (e.g. Colab).
#
# In Colab, mount Google Drive and point `data_root` at the folder holding the
# NL data and the SRO scalar-DV CSVs. Nothing here is committed-data dependent.

paths:
  # Root that contains: output_nl/{complete,retest}/*.jsonl  and  sro_dv/*.csv
  data_root: /content/drive/MyDrive/sro_minitaur
  nl_dir: ${paths.data_root}/output_nl          # complete/ and retest/ subdirs
  # SRO scalar DVs (for Phase 0b/0c). Copy these two from the SRO release:
  #   Data/Complete_02-16-2019/meaningful_variables.csv  -> sro_dv/complete.csv
  #   Data/Retest_02-16-2019/meaningful_variables.csv    -> sro_dv/retest.csv
  dv_complete: ${paths.data_root}/sro_dv/complete.csv
  dv_retest: ${paths.data_root}/sro_dv/retest.csv
  results: ./results

split:
  seed: 0
  heldout_frac: 0.2          # fraction of the 522 complete subjects held out
  # Retest subjects are kept as a separate evaluation pool (reliability + same
  # task identification). One subject can be singled out as `unseen` for demos.
  unseen_subject: null

model:
  # Base behavioral foundation model. The plan calls it "Minitaur 8B"
  # (Llama-3.1-8B + Psych-101 LoRA). Set this to your Minitaur checkpoint.
  # The Centaur-8B adapter is the documented public reference point.
  base_model: marcelbinz/Llama-3.1-Centaur-8B-adapter
  base_llm: meta-llama/Llama-3.1-8B          # adapter is applied on top of this
  load_in_4bit: true                          # QLoRA-style for a single Colab GPU
  max_seq_len: 4096                           # ART sessions exceed this -> truncate

mpop_finetune:                                 # Phase 1
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lr: 1.0e-4
  epochs: 1
  batch_size: 1
  grad_accum: 16
  # Loss is computed ONLY on <<...>> response tokens (Centaur convention).

person_transfer:                               # Phase 2
  z_dim: 64                                    # person-embedding dimension
  injection: soft_prompt                       # soft_prompt | film | lora
  n_soft_tokens: 8
  encoder: set_transformer                     # pools a person's source trials -> z
  lr: 1.0e-3
  epochs: 5

eval:
  identification_K: 10                         # candidates per identification trial
  n_shuffle_controls: 5                        # shuffled-z permutations
